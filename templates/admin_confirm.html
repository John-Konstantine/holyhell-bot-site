<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение администратора</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #1f1f1f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px #44c767;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #44c767;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: none;
            background: #3a3a3a;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #44c767;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .error {
            color: #f44336;
            text-align: center;
            margin-bottom: 10px;
        }
        .timer {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Код подтверждения</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="timer">
        Действителен ещё: <span id="countdown">5:00</span>
    </div>

    <form method="post">
        <input type="text" name="code" placeholder="Введите код из Telegram" required>
        <button type="submit">Подтвердить</button>
    </form>
</div>

<script>
    let totalSeconds = 300;  // 5 минут

    function updateTimer() {
        let minutes = Math.floor(totalSeconds / 60);
        let seconds = totalSeconds % 60;
        document.getElementById("countdown").textContent =
            `${String(minutes).padStart(1, '0')}:${String(seconds).padStart(2, '0')}`;
        if (totalSeconds > 0) {
            totalSeconds--;
            setTimeout(updateTimer, 1000);
        } else {
            document.getElementById("countdown").textContent = "Код истёк";
        }
    }

    updateTimer();
</script>

</body>
</html>
