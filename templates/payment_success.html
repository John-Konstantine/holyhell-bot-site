<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата успешна | HolyHell Bot</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #1a1a1a;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #ff3333;
        }
        .success {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00cc66;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 30px;
            font-size: 16px;
            border: none;
            background-color: #00cc66;
            color: black;
            border-radius: 6px;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #00b359;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HolyHell Bot</div>
        <div class="success">✅ Оплата прошла успешно!</div>
        <div>Подписка продлена на 30 дней.</div>
        <a href="/dashboard" class="btn">Вернуться в личный кабинет</a>
    </div>
</body>
</html>
