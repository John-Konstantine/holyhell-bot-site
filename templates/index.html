<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добро пожаловать</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f1f1f, #292929);
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .logo-container {
            margin-top: 60px;
        }

        .logo-container img {
            width: 300px;
            filter: drop-shadow(0 0 10px #44c767);
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        .bot-title {
            margin-top: 10px;
            font-size: 40px;
            color: #44c767;
            text-shadow: 0 0 10px #44c767, 0 0 20px #44c767;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }

        .tagline {
            margin-top: 15px;
            font-size: 16px;
            color: #cccccc;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 20px;
            line-height: 1.6;
            font-family: 'Orbitron', sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 40px auto 20px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 28px;
            color: #44c767;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            background-color: #44c767;
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: #36a153;
            transform: scale(1.05);
        }

        .footer {
            margin: 50px 0 20px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="/static/logo.png" alt="Logo">
        <div class="bot-title">HolyHell Bot</div>
        <div class="tagline">
            Баланс дисциплины и жадности,<br>
            холодного расчёта и дьявольской прибыли.<br>
            Ты не выбираешь сторону — ты используешь обе.
        </div>
    </div>

    <div class="container">
        <h1>Добро пожаловать в личный кабинет</h1>
        <a href="/login" class="button">Войти</a>
        <a href="/register" class="button">Зарегистрироваться</a>
    </div>

    <div class="footer">
        © 2025 HolyHell Bot. Все права защищены.
    </div>
</body>
</html>
