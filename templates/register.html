<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1f1f1f, #292929);
            font-family: 'Orbitron', sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-container {
            margin-top: 20px;
        }

        .logo-container img {
            width: 400px;
            filter: drop-shadow(0 0 10px #44c767);
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        .bot-title {
            margin-top: 5px;
            margin-bottom: 30px;
            font-size: 40px;
            color: #44c767;
            text-shadow: 0 0 10px #44c767, 0 0 20px #44c767;
            font-weight: bold;
        }

        .form-container {
            background-color: #2c2c2c;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin-top: -20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #3a3a3a;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 5px #44c767;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #44c767;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: #36a153;
        }

        .error {
            color: #ff4b4b;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="/static/logo.png" alt="Logo">
    </div>

    <div class="bot-title">HolyHell Bot</div>

    <div class="form-container">
        <h2>Регистрация</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register">
            <input type="text" name="login" placeholder="Логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <input type="text" name="api_key" placeholder="API Key от Binance" required>
            <input type="text" name="api_secret" placeholder="API Secret от Binance" required>
            <input type="text" name="telegram_id" placeholder="Telegram ID" required>
            <input type="text" name="telegram_token" placeholder="Telegram Bot Token" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
    </div>
</body>
</html>
